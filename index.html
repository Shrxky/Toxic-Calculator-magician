<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="secretInput" style="visibility: visible;">
        <input id="numberinput">
        <button id="secretSubmit">Submit</button>
    </div>

    <label id="result">0</label>

    <div id ="buttonContainer" style="visibility: visible;">
        <button class="invisible" onclick="backspace()"><img src="backspace.png" width="20px" height="20px"></button>
        <button class="invisible" id="clear" onclick = "clearValues()">AC</button>
        <button class="invisible" >%</button>
        <button class="invisible" id="button13">÷</button><br>

        <button class="invisible" id="button7">7</button>
        <button class="invisible" id="button8">8</button>
        <button class="invisible" id="button9">9</button>
        <button class="invisible" id="button12">X</button><br>
        
        <button class="invisible" id="button4">4</button>
        <button class="invisible" id="button5">5</button>
        <button class="invisible" id="button6">6</button>
        <button class="invisible" id="button11">-</button><br>

        <button class="invisible" id="button1">1</button>
        <button class="invisible" id="button2">2</button>
        <button class="invisible" id="button3">3</button>
        <button class="invisible" id="button10">+</button><br>
        
        <button class="invisible"  id ="secretLength">+/-</button>
        <button class="invisible"  id="button0">0</button>
        <button onclick="dotPressed()">.</button>
        <button class="invisible" id="sum" onclick = "sumValues()">=</button>

        </div>
    
    <script src="index.js"></script>
</body>
</html>
